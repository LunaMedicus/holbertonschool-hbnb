<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="form-container">
            <h1>Add Review</h1>
            <p id="place-name-display"></p>
            <form id="review-form" class="add-review">
                <div class="form-group">
                    <label for="text">Your Review</label>
                    <textarea id="text" name="text" rows="4" placeholder="Write your review..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="1">1 - Poor</option>
                        <option value="2">2 - Fair</option>
                        <option value="3">3 - Good</option>
                        <option value="4">4 - Very Good</option>
                        <option value="5">5 - Excellent</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Submit Review</button>
                <p id="review-message" class="error-message" aria-live="polite"></p>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
