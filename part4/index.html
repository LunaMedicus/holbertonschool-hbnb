<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" id="login-link" class="login-button">Login</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="filter-section">
            <h1>Places</h1>
            <div class="filter-bar">
                <label for="price-filter">Filter by max price:</label>
                <select id="price-filter">
                    <option value="all">All</option>
                    <option value="10">$10</option>
                    <option value="50">$50</option>
                    <option value="100">$100</option>
                </select>
            </div>
        </section>
        <section id="places-list" class="places-grid">
        </section>
    </main>
    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
